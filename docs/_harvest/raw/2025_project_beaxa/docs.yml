name: docs-ci
on:
  push: { paths: ['**.md'] }
  pull_request: { paths: ['**.md'] }
jobs:
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Basic link check
        run: |
          grep -RhoE '\(https?://[^ )]+?\)' --include='*.md' || true
          echo 'OK'